name: Build InstaEducate APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew
      # If gradlew isn't initialized yet, we fall back to installing gradle
      continue-on-error: true

    - name: Initialize Gradle Wrapper if Missing
      run: |
        if [ ! -f "gradlew" ]; then
          echo "Gradle wrapper not found, generating wrapper using gradle command..."
          sudo apt-get update && sudo apt-get install -y gradle
          gradle wrapper
          chmod +x gradlew
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Built APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InstaEducate-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 7
