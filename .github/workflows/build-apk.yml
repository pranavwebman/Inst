name: Build InstaEducate APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        # Install API level 34 and build tools 34.0.0 (required by the app)
        packages: "platforms;android-34 build-tools;34.0.0"

    # ----- Fix missing Gradle wrapper (without installing system Gradle) -----
    - name: Restore missing Gradle wrapper JAR
      run: |
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "⚠️ gradle-wrapper.jar is missing – downloading it now"
          mkdir -p gradle/wrapper
          # Use the version declared in gradle-wrapper.properties (or default to 8.0)
          wget https://github.com/gradle/gradle/raw/v8.0/gradle/wrapper/gradle-wrapper.jar \
            -O gradle/wrapper/gradle-wrapper.jar
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: InstaEducate-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
        retention-days: 7
